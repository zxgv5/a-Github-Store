app-id: zed.rainxch.githubstore
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.openjdk21
command: githubstore

finish-args:
  # Network access for GitHub API calls and downloading releases
  - --share=network
  # Display support — X11 required (Compose/Skiko doesn't support native Wayland yet)
  # On Wayland desktops this uses XWayland, available on all major distros
  - --socket=x11
  - --share=ipc
  # GPU acceleration for Compose rendering
  - --device=dri
  # Download directory access for APK/release downloads
  - --filesystem=xdg-download:rw

modules:
  # Module 1: Bundle JetBrains Runtime (JBR) 21 for optimal Compose Desktop rendering
  # Using plain jbr (no JCEF) — app doesn't use embedded Chromium
  - name: jbr
    buildsystem: simple
    build-commands:
      - mkdir -p /app/jre
      - tar xzf jbr-*.tar.gz -C /app/jre --strip-components=1
    sources:
      # x86_64
      - type: file
        url: https://cache-redirector.jetbrains.com/intellij-jbr/jbr-21.0.10-linux-x64-b1163.105.tar.gz
        sha256: b6a3b13451d296140727bbde9325dd9ee422e2e9b2c6a9378f346f1b8d1111bc
        only-arches:
          - x86_64
      # aarch64
      - type: file
        url: https://cache-redirector.jetbrains.com/intellij-jbr/jbr-21.0.10-linux-aarch64-b1163.105.tar.gz
        sha256: 38804f526d869f5a9c49e9b90c04edcbc918b41e8e43264e5d5076d352a959bc
        only-arches:
          - aarch64

  # Module 2: Build and install GitHub Store
  - name: githubstore
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/openjdk21/bin
      env:
        JAVA_HOME: /usr/lib/sdk/openjdk21
        GRADLE_USER_HOME: /run/build/githubstore/.gradle
    build-commands:
      # Use local Gradle distribution (no network needed)
      - sed -i 's|distributionUrl=.*|distributionUrl=gradle-bin.zip|' gradle/wrapper/gradle-wrapper.properties
      # Rewrite settings.gradle.kts files to use offline Maven repository
      - |
        python3 -c "
        # 1. Rewrite root settings.gradle.kts
        lines = open('settings.gradle.kts').readlines()
        includes = [l for l in lines if l.strip().startswith('include(')]
        with open('settings.gradle.kts', 'w') as f:
            f.write('rootProject.name = \"GithubStore\"\n')
            f.write('enableFeaturePreview(\"TYPESAFE_PROJECT_ACCESSORS\")\n\n')
            f.write('pluginManagement {\n')
            f.write('    includeBuild(\"build-logic\")\n')
            f.write('    repositories {\n')
            f.write('        maven { url = uri(\"/run/build/githubstore/offline-repository\") }\n')
            f.write('    }\n')
            f.write('}\n\n')
            f.write('dependencyResolutionManagement {\n')
            f.write('    repositories {\n')
            f.write('        maven { url = uri(\"/run/build/githubstore/offline-repository\") }\n')
            f.write('    }\n')
            f.write('}\n\n')
            # foojay-resolver-convention plugin removed — not needed in Flatpak
            # (JAVA_HOME is set explicitly, no toolchain auto-download)
            for inc in includes:
                f.write(inc)
        print('Rewrote root settings.gradle.kts for offline build')

        # 2. Rewrite build-logic/settings.gradle.kts
        with open('build-logic/settings.gradle.kts', 'w') as f:
            f.write('@file:Suppress(\"UnstableApiUsage\")\n\n')
            f.write('rootProject.name = \"build-logic\"\n\n')
            f.write('pluginManagement {\n')
            f.write('    repositories {\n')
            f.write('        maven { url = uri(\"/run/build/githubstore/offline-repository\") }\n')
            f.write('    }\n')
            f.write('}\n\n')
            f.write('dependencyResolutionManagement {\n')
            f.write('    repositories {\n')
            f.write('        maven { url = uri(\"/run/build/githubstore/offline-repository\") }\n')
            f.write('    }\n\n')
            f.write('    versionCatalogs {\n')
            f.write('        create(\"libs\") {\n')
            f.write('            from(files(\"../gradle/libs.versions.toml\"))\n')
            f.write('        }\n')
            f.write('    }\n')
            f.write('}\n\n')
            f.write('include(\":convention\")\n')
        print('Rewrote build-logic/settings.gradle.kts for offline build')
        "
      # Disable Android targets (no Android SDK in Flatpak sandbox)
      - bash packaging/flatpak/disable-android-for-flatpak.sh
      # Build uber JAR — all deps resolved from offline-repository (local file:// Maven repo,
      # no network needed even without --offline flag since sandbox has no network access)
      - ./gradlew :composeApp:packageUberJarForCurrentOS
          --no-daemon
          --no-configuration-cache
          -Dorg.gradle.jvmargs="-Xmx6g -XX:MaxMetaspaceSize=2g"
          -Dorg.gradle.parallel=false
      # Install the JAR
      - install -Dm644 "$(find composeApp/build/compose/jars/ -name '*.jar' -type f | head -1)"
          /app/lib/githubstore.jar
      # Install launcher script
      - install -Dm755 packaging/flatpak/githubstore.sh /app/bin/githubstore
      # Install desktop entry
      - install -Dm644 packaging/flatpak/zed.rainxch.githubstore.desktop
          /app/share/applications/zed.rainxch.githubstore.desktop
      # Install AppStream metainfo
      - install -Dm644 packaging/flatpak/zed.rainxch.githubstore.metainfo.xml
          /app/share/metainfo/zed.rainxch.githubstore.metainfo.xml
      # Install icon (512x512)
      - install -Dm644 composeApp/src/jvmMain/resources/logo/app_icon.png
          /app/share/icons/hicolor/512x512/apps/zed.rainxch.githubstore.png
    sources:
      # NOTE: For Flathub submission, switch this to:
      #   type: git
      #   url: https://github.com/OpenHub-Store/GitHub-Store.git
      #   tag: <release-tag>
      - type: dir
        path: ../../
      # Gradle distribution (referenced by gradle-wrapper.properties after sed patch)
      - type: file
        url: https://services.gradle.org/distributions/gradle-8.14.3-bin.zip
        sha256: bd71102213493060956ec229d946beee57158dbd89d0e62b91bca0fa2c5f3531
        dest: gradle/wrapper
        dest-filename: gradle-bin.zip
      # Pre-downloaded Gradle/Maven dependencies for offline build
      - flatpak-sources.json
      - flatpak-sources-convention.json
      - flatpak-sources-manual.json
